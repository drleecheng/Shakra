<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>Shakra</title>
</head>

<body>

  <h1 style="text-align: center;">Shakra - A finger music game</h1>
  <div style="text-align: center;">
    <!-- Modified button: Starts disabled and shows loading status -->
    <button id="button_webcam" disabled onclick="displayCamera(); cameraOnSignal(); this.style.display='none';" style="display: inline-block; max-width: 640px; border: none; background-color: #888888; color: white; padding: 14px 28px; font-size: 16px; cursor: not-allowed; text-align: center;">
      Loading instruments & model...
    </button>
  </div>

  <!-- Carousel -->
  <div id="slides" style="text-align: center;">
    <br/>
    <img src="Pinch.jpg" style="max-width:640px">
  </div>

  <!-- Check if mobile -->
  <h1 id="mobile" style="text-align: center;">Turn on audio on your device</h1>
  <script>
    let details = navigator.userAgent;
    let regexp = /android|iphone|kindle|ipad/i;
    let isMobileDevice = regexp.test(details);
    if (!isMobileDevice) {
      document.getElementById("mobile").style.display = "none";
    }
  </script>

  <!-- Display camera when button clicked -->
  <script>
  function displayCamera() {
    document.getElementById("slides").style.display = "none";
    document.getElementById("canvas").style.display = "block";
  }
  </script>

  <div id="canvas" style="text-align: center; display: none"></div>

  <!-- include js libraries -->
  <script src="libraries/p5.js"></script>
  <script src="libraries/ml5.min.js"></script>
  <script src="libraries/Tone.js"></script>
  <script src="libraries/Tonejs-Instruments.js"></script>
  <script src="sketch.js"></script>

</body>
</html>
